      API catalog. The verified machine-readable footprint is library/open-access
      infrastructure: a live DSpace OAI-PMH endpoint for the institutional
      dissertation repository (ediss.sub.hamburg) and the Open-Access-Portal. An
      official Universität Hamburg GitHub organization exists (3 public repos) and
      an RRZ-hosted GitLab is available. Campus systems (STiNE) and Shibboleth/SAML
      SSO are gated and not documented as public APIs. No endpoints or
      properties were fabricated; only URLs probed live or confirmed via authoritative
      sources are listed below.
