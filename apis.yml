---
aid: universitat-hamburg
name: Universität Hamburg
description: >-
  Universität Hamburg is a public research university in Hamburg, Germany,
  ranked #191 in the QS World University Rankings 2025. Its public developer and
  machine-readable footprint is concentrated in library and open-access
  infrastructure operated by the Staats- und Universitätsbibliothek (SUB) and the
  Regionales Rechenzentrum (RRZ), rather than a single branded developer portal.
  Confirmed public interfaces include a DSpace-based institutional dissertation
  repository (ediss.sub.hamburg) exposing an OAI-PMH metadata endpoint, and an
  official Universität Hamburg open-source presence on GitHub. Campus systems such
  as the STiNE campus-management platform and Shibboleth/SAML single sign-on are
  gated and not openly documented as public APIs.
