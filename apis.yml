apis:
  - aid: universitat-hamburg:ediss-oai
    name: E-Dissertationen (ediss.sub.hamburg) OAI-PMH
    description: >-
      OAI-PMH metadata-harvesting interface for the DSpace-based institutional
      repository of electronic dissertations and habilitations of Universität
      Hamburg, operated by the Staats- und Universitätsbibliothek Hamburg. The
      endpoint supports the standard OAI-PMH 2.0 verbs (Identify, ListRecords,
      ListMetadataFormats, etc.) and was verified live returning Dublin Core
      metadata.
    humanURL: https://www.sub.uni-hamburg.de/service/publizieren/dissertationen/e-dissertationen-der-uhh.html
