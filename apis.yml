  - aid: universitat-hamburg:open-access-portal
    name: Open-Access-Portal Universität Hamburg
    description: >-
      Open Access discovery portal aggregating freely available publications,
      research data, teaching materials, and scientific collections of Universität
      Hamburg. Underlying IT services (repositories and metadata exports such as
      OAI) are operated by the Regionales Rechenzentrum (RRZ); no single public,
      documented REST API is published, so this entry indexes the human-facing
      portal and its harvestable metadata infrastructure.
    humanURL: https://www.openaccess.uni-hamburg.de/en.html
